# BinSense AI — Conda environment
# Creates a Python 3.11 environment that mirrors Google Colab's runtime.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate binsense
#
# If conda is not installed, get Miniconda from:
#   https://docs.conda.io/en/latest/miniconda.html

name: binsense
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch — CPU build (change 'cpuonly' to cudatoolkit=12.1 for GPU)
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - cpuonly

  # Core science stack (conda builds preferred for native libs)
  - numpy>=1.26
  - scipy>=1.13
  - scikit-learn>=1.5
  - pandas>=2.2
  - matplotlib>=3.9
  - seaborn>=0.13
  - ipython>=8.25
  - ipywidgets>=8.1
  - jupyter
  - jupyterlab>=4.2

  # pip-only packages
  - pip:
    - ultralytics>=8.2.0
    - timm>=1.0.3
    - faiss-cpu>=1.8.0
    - opencv-python-headless>=4.9.0
    - Pillow>=10.3.0
    - boto3>=1.34.0
    - botocore>=1.34.0
    - requests>=2.32.0
    - tqdm>=4.66.0
    - mlflow>=2.13.0
    - prometheus-client>=0.20.0
    - streamlit>=1.35.0
    - gradio>=4.36.0
    - python-dotenv>=1.0.0
    - pyyaml>=6.0.1
    # SAM — install manually after env creation:
    # pip install git+https://github.com/facebookresearch/segment-anything.git
